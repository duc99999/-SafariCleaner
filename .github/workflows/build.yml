name: Build SafariCleaner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build tweak package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang g++ libssl-dev libplist-dev \
            libplist-utils libcurl4-openssl-dev libavahi-compat-libdnssd-dev \
            fakeroot dpkg dpkg-dev gnupg curl wget git xz-utils perl file unzip ca-certificates zstd dos2unix

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Download iOS toolchain (CRKatri Linux tarball)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          mkdir -p "$THEOS/toolchain/linux/iphone"
          cd /tmp

          curl -fL --retry 3 --retry-delay 5 -o toolchain.tar.zst \
            "https://github.com/CRKatri/llvm-project/releases/download/swift-5.3.2-RELEASE/swift-5.3.2-RELEASE-ubuntu20.04.tar.zst"

          TMP_DIR=$(mktemp -d)
          echo "=== Extracting toolchain ==="
          tar --zstd -xf toolchain.tar.zst -C "$TMP_DIR"

          echo "=== Top-level contents ==="
          ls -la "$TMP_DIR"

          TOOLCHAIN_ROOT=$(find "$TMP_DIR" -maxdepth 1 -mindepth 1 -type d | head -1)
          echo "=== Toolchain root: $TOOLCHAIN_ROOT ==="

          cp -r "$TOOLCHAIN_ROOT"/. "$THEOS/toolchain/linux/iphone/"
          chmod +x "$THEOS/toolchain/linux/iphone/bin/"* 2>/dev/null || true

          echo "=== Toolchain installed at \$THEOS/toolchain/linux/iphone ==="
          ls "$THEOS/toolchain/linux/iphone/bin/" | head -20

          rm -rf "$TMP_DIR" toolchain.tar.zst

      - name: Verify toolchain (clang version)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          echo "=== clang version ==="
          "$THEOS/toolchain/linux/iphone/bin/clang" --version | head -3
          echo ""
          echo "=== ldid ==="
          "$THEOS/toolchain/linux/iphone/bin/ldid" -h 2>&1 | head -3

      - name: Install iPhoneOS SDK 14.5 (compatible with clang 10)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          SDK_DIR="$THEOS/sdks"
          mkdir -p "$SDK_DIR"
          cd /tmp

          curl -fL --retry 3 --retry-delay 5 -o iPhoneOS14.5.sdk.tar.xz \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz"

          echo "=== Extracting iPhoneOS14.5 SDK ==="
          tar -xf iPhoneOS14.5.sdk.tar.xz

          cp -r iPhoneOS14.5.sdk "$SDK_DIR/"
          rm -rf iPhoneOS14.5.sdk.tar.xz iPhoneOS14.5.sdk

          echo "=== Installed SDKs ==="
          ls -la "$SDK_DIR/"

      - name: Convert text files to Unix line endings (fix Windows CRLF)
        run: |
          echo "=== Files with Windows line endings ==="
          find . -type f \( \
              -path "./layout/*" -o \
              -name "control" -o \
              -name "Makefile" -o \
              -name "*.plist" -o \
              -name "*.l" -o \
              -name "*.x" -o \
              -name "*.xm" -o \
              -name "*.mm" -o \
              -name "*.m" -o \
              -name "*.h" -o \
              -name "*.cpp" -o \
              -name "*.c" \
          \) -print0 2>/dev/null \
            | xargs -0 -I{} grep -l $'\r' "{}" 2>/dev/null \
            | tee /tmp/crlf_files.txt || true

          echo ""
          echo "=== Converting CRLF -> LF ==="
          xargs -a /tmp/crlf_files.txt -d '\n' dos2unix 2>&1 || true

          echo ""
          echo "=== Verify no more CRLF ==="
          REMAINING=$(find . -type f \( \
              -path "./layout/*" -o \
              -name "control" -o \
              -name "Makefile" \
          \) -print0 2>/dev/null \
            | xargs -0 -I{} grep -l $'\r' "{}" 2>/dev/null | wc -l)
          echo "Files still with CRLF: $REMAINING"

      - name: Fix permissions on DEBIAN maintainer scripts
        run: |
          echo "=== Current permissions of DEBIAN scripts ==="
          ls -la ./layout/DEBIAN/ 2>/dev/null || echo "(no DEBIAN dir yet)"

          for f in ./layout/DEBIAN/preinst ./layout/DEBIAN/postinst ./layout/DEBIAN/prerm ./layout/DEBIAN/postrm; do
            if [ -f "$f" ]; then
              chmod 0755 "$f"
              echo "chmod 0755 $f -> $(stat -c '%a' "$f")"
            fi
          done

          if [ -d ./layout/usr/bin ]; then
            for f in ./layout/usr/bin/*; do
              if [ -f "$f" ]; then
                chmod 0755 "$f"
                echo "chmod 0755 $f -> $(stat -c '%a' "$f")"
              fi
            done
          fi

          echo ""
          echo "=== Permissions after fix ==="
          ls -la ./layout/DEBIAN/ 2>/dev/null || true
          ls -la ./layout/usr/bin/ 2>/dev/null || true

      - name: Build tweak package
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          export THEOS="${{ env.THEOS }}"
          export PATH="$THEOS/bin:$PATH"

          cd "$GITHUB_WORKSPACE"
          rm -rf packages

          echo "=== Using Makefile as-is (TARGET already set to 14.5) ==="
          grep "^TARGET" Makefile || true

          echo "=== Cleaning ==="
          make clean

          echo "=== Building package ==="
          make package FINALPACKAGE=1 2>&1 | tee build.log

          echo ""
          echo "===== Build output ====="
          ls -la *.deb 2>/dev/null || ls -la packages/ 2>/dev/null || (echo "WARNING: No .deb produced" && exit 1)

      - name: Collect deb artifacts
        if: always()
        run: |
          set -e
          mkdir -p artifacts
          find . -type f -name "*.deb" -exec cp -v {} artifacts/ \; || true

          if compgen -G "artifacts/*.deb" > /dev/null; then
            dpkg-scanpackages artifacts /dev/null > artifacts/Packages 2>/dev/null || true
            gzip -9kf artifacts/Packages 2>/dev/null || true
          fi

          echo "===== Artifacts ====="
          ls -la artifacts/

      - name: Upload debs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SafariCleaner-debs
          path: |
            artifacts/*.deb
            artifacts/Packages
            artifacts/Packages.gz
          if-no-files-found: warn
          retention-days: 30
