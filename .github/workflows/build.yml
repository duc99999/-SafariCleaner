name: Build SafariCleaner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build tweak package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang g++ libssl-dev libplist-dev \
            libplist-utils libcurl4-openssl-dev libavahi-compat-libdnssd-dev \
            fakeroot dpkg dpkg-dev gnupg curl wget git xz-utils perl file unzip ca-certificates

      - name: Build ldid from xerub source
        run: |
          set -e
          cd /tmp
          rm -rf ldid
          git clone --depth=1 https://github.com/xerub/ldid.git
          cd ldid
          chmod +x make.sh
          ./make.sh
          sudo cp ldid /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid
          ldid -h 2>&1 | head -3 || echo "ldid installed"

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Install iPhoneOS SDK (clone theos/sdks, symlink 15.5 to 15.6)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          SDK_DIR="$THEOS/sdks"
          mkdir -p "$SDK_DIR"

          echo "=== Cloning theos/sdks (using git-lfs) ==="
          rm -rf /tmp/sdks-official
          git clone https://github.com/theos/sdks.git /tmp/sdks-official
          cd /tmp/sdks-official
          git lfs install
          git lfs pull

          echo "=== Available SDKs ==="
          ls -d iPhoneOS*.sdk

          # Ưu tiên 1: iPhoneOS15.5.sdk (không có trong repo này)
          # Ưu tiên 2: iPhoneOS15.6.sdk (có sẵn, gần nhất với 15.5)
          if [ -d "iPhoneOS15.5.sdk" ]; then
            cp -r iPhoneOS15.5.sdk "$SDK_DIR/"
            echo "=== Installed exact 15.5 ==="
          elif [ -d "iPhoneOS15.6.sdk" ]; then
            cp -r iPhoneOS15.6.sdk "$SDK_DIR/iPhoneOS15.5.sdk"
            echo "=== Installed 15.6 as 15.5 (symlink/copy) ==="

            # Verify SDK có đầy đủ file quan trọng không
            if [ ! -f "$SDK_DIR/iPhoneOS15.5.sdk/SDKSettings.plist" ]; then
              echo "WARNING: SDKSettings.plist missing, SDK might be incomplete"
            fi
          else
            echo "ERROR: No iOS 15.x SDK found"
            ls -d iPhoneOS*.sdk
            exit 1
          fi

          echo "===== Installed SDKs ====="
          ls -la "$SDK_DIR/"

      - name: Verify SDK structure
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          echo "=== SDK contents ==="
          ls -la "$THEOS/sdks/iPhoneOS15.5.sdk/" 2>&1 | head -10
          echo ""
          echo "=== Frameworks ==="
          ls "$THEOS/sdks/iPhoneOS15.5.sdk/System/Library/Frameworks/" 2>&1 | head -5 || echo "MISSING"

      - name: Build tweak (override clang version)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          export THEOS="${{ env.THEOS }}"
          export PATH="$THEOS/bin:$PATH"

          cd "$GITHUB_WORKSPACE"

          rm -rf packages

          # Override TARGET để dùng clang bất kỳ (không yêu cầu clang 15.0)
          sed -i.bak 's|iphone:clang:15.5:15.0|iphone:clang:latest:15.5|g' Makefile
          echo "=== Patched Makefile ==="
          grep "^TARGET" Makefile || true

          make clean || true
          make package FINALPACKAGE=1 \
            THEOS_DEVICE_IP="" THEOS_DEVICE_PORT="" \
            GO_EASY_ON_ME=1 \
            THEOS_CLANG_VERSION="" 2>&1 | tee build.log || true

          echo ""
          echo "===== Build log tail ====="
          tail -50 build.log || true
          echo ""
          echo "===== Build output ====="
          ls -la *.deb 2>/dev/null || ls -la packages/ 2>/dev/null || echo "NO .deb found"

      - name: Collect deb artifacts
        if: always()
        run: |
          set -e
          mkdir -p artifacts
          find . -type f -name "*.deb" -exec cp -v {} artifacts/ \; || true
          dpkg-scanpackages artifacts /dev/null > artifacts/Packages 2>/dev/null || true
          gzip -9kf artifacts/Packages 2>/dev/null || true
          echo "===== Artifacts ====="
          ls -la artifacts/

      - name: Upload debs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SafariCleaner-debs
          path: |
            artifacts/*.deb
            artifacts/Packages
            artifacts/Packages.gz
          if-no-files-found: warn
          retention-days: 30
