name: Build SafariCleaner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build tweak package
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang g++ libssl-dev libplist-dev \
            libplist-utils libcurl4-openssl-dev libavahi-compat-libdnssd-dev \
            fakeroot dpkg dpkg-dev gnupg curl wget git xz-utils perl file unzip ca-certificates

      - name: Build ldid from xerub source
        run: |
          set -e
          cd /tmp
          rm -rf ldid
          git clone --depth=1 https://github.com/xerub/ldid.git
          cd ldid
          chmod +x make.sh
          ./make.sh
          sudo cp ldid /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid
          ldid -h 2>&1 | head -3 || echo "ldid installed"

      - name: Install Theos
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          git clone --depth=1 --recursive https://github.com/theos/theos.git "$THEOS"
          echo "THEOS=$THEOS" >> "$GITHUB_ENV"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

      - name: Install iPhoneOS 15.5 SDK (Procursus)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          SDK_DIR="$THEOS/sdks"
          mkdir -p "$SDK_DIR"

          # Xóa SDK cũ nếu có (để tránh trùng)
          rm -rf "$SDK_DIR/iPhoneOS15.5.sdk"

          echo "=== Downloading iPhoneOS15.5.sdk from Procursus ==="
          cd /tmp
          if ! curl -fsSL -o sdk.tar.xz \
              "https://github.com/ProcursusTeam/SDKs/releases/download/v1.0/iPhoneOS15.5.sdk.tar.xz"; then
            echo "=== Procursus URL failed, trying alternate ==="
            # Fallback: tải từ theos/sdks (chính thức)
            git clone --depth=1 https://github.com/theos/sdks.git /tmp/sdks-official
            cd /tmp/sdks-official
            git lfs install 2>/dev/null || true
            git lfs pull 2>/dev/null || true
            # Copy SDK 15.5 nếu có
            if [ -d "iPhoneOS15.5.sdk" ]; then
              cp -r "iPhoneOS15.5.sdk" "$SDK_DIR/"
            else
              echo "ERROR: iPhoneOS15.5.sdk not found in either source"
              ls -la /tmp/sdks-official/
              exit 1
            fi
            exit 0
          fi

          # Extract SDK từ Procursus tarball
          mkdir -p sdk-extract
          cd sdk-extract
          tar -xf ../sdk.tar.xz

          # Tìm folder SDK
          SDK_FOUND=$(find . -maxdepth 3 -name "iPhoneOS*.sdk" -type d | head -1)
          if [ -z "$SDK_FOUND" ]; then
            # Có thể SDK nằm trực tiếp trong tarball, thử di chuyển
            ls -la
            SDK_FOUND=$(find . -maxdepth 2 -name "iPhoneOS*" | head -1)
          fi

          if [ -n "$SDK_FOUND" ] && [ -d "$SDK_FOUND" ]; then
            echo "=== Found SDK at: $SDK_FOUND ==="
            cp -r "$SDK_FOUND" "$SDK_DIR/iPhoneOS15.5.sdk"
            echo "=== Installed SDK ==="
          else
            echo "ERROR: Could not extract SDK"
            ls -la
            exit 1
          fi

          echo "===== SDKs available ====="
          ls -la "$SDK_DIR/"

      - name: Verify SDK structure
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          echo "=== SDK contents ==="
          ls -la "$THEOS/sdks/iPhoneOS15.5.sdk/" 2>&1 | head -20
          echo ""
          echo "=== SDKSettings.plist ==="
          cat "$THEOS/sdks/iPhoneOS15.5.sdk/SDKSettings.plist" 2>&1 | head -20 || echo "MISSING SDKSettings.plist"
          echo ""
          echo "=== System/Library/Frameworks ==="
          ls "$THEOS/sdks/iPhoneOS15.5.sdk/System/Library/Frameworks/" 2>&1 | head -10 || echo "MISSING frameworks"

      - name: Build tweak (force clang, override TARGET)
        env:
          THEOS: ${{ github.workspace }}/.theos
        run: |
          set -e
          export THEOS="${{ env.THEOS }}"
          export PATH="$THEOS/bin:$PATH"

          cd "$GITHUB_WORKSPACE"

          rm -rf packages

          # Patch Makefile để dùng clang có sẵn trên Ubuntu (bypass yêu cầu clang 15.0)
          # Thay vì sửa Makefile vĩnh viễn, ta override qua env vars + sed
          sed -i.bak 's|iphone:clang:15.5:15.0|iphone:clang:latest:15.5|g' Makefile
          echo "=== Patched Makefile ==="
          grep "^TARGET" Makefile || true

          make clean || true
          make package FINALPACKAGE=1 \
            THEOS_DEVICE_IP="" THEOS_DEVICE_PORT="" \
            GO_EASY_ON_ME=1 \
            THEOS_CLANG_VERSION="" \
            THEOS_USE_CLANG_FROM_PATH=1 || true

          echo "===== Build output ====="
          ls -la *.deb 2>/dev/null || ls -la packages/ 2>/dev/null || echo "NO .deb found"

      - name: Collect deb artifacts
        if: always()
        run: |
          set -e
          mkdir -p artifacts
          find . -type f -name "*.deb" -exec cp -v {} artifacts/ \; || true
          dpkg-scanpackages artifacts /dev/null > artifacts/Packages 2>/dev/null || true
          gzip -9kf artifacts/Packages 2>/dev/null || true
          echo "===== Artifacts ====="
          ls -la artifacts/

      - name: Upload debs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SafariCleaner-debs
          path: |
            artifacts/*.deb
            artifacts/Packages
            artifacts/Packages.gz
          if-no-files-found: warn
          retention-days: 30
